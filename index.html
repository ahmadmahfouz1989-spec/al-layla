<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الليلة</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      width: 90%;
      max-width: 600px;
    }

    .title {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 0.25em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      color: #555;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 3.5rem;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }

    .progress-wrapper {
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .progress-track {
      background: #1a1a2e;
      border-radius: 100px;
      height: 10px;
      width: 100%;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.15);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 100px;
      background: linear-gradient(90deg, #065f46, #10b981, #6ee7b7);
      box-shadow:
        0 0 8px rgba(16, 185, 129, 0.6),
        0 0 20px rgba(16, 185, 129, 0.3);
      transition: width 0.03s linear;
      position: relative;
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 40px;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4));
      border-radius: 100px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
    }

    .progress-num {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #10b981, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .progress-pct {
      font-size: clamp(0.75rem, 2vw, 0.9rem);
      color: #444;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    /* background orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }

    .orb-1 {
      width: 400px;
      height: 400px;
      background: rgba(16, 185, 129, 0.08);
      top: -100px;
      left: -100px;
    }

    .orb-2 {
      width: 300px;
      height: 300px;
      background: rgba(167, 139, 250, 0.08);
      bottom: -80px;
      right: -80px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="container">
    <h1 class="title">الليلة</h1>

<div class="progress-wrapper">
      <div class="progress-track">
        <div class="progress-fill" id="fill"></div>
      </div>
      <div class="progress-label">
        <span class="progress-num" id="num">0</span>
        <span class="progress-pct">مؤشر الليلة</span>
      </div>
    </div>

  </div>

  <script>
    const fill = document.getElementById('fill');
    const num  = document.getElementById('num');

    let current = 0;
    const total = 100;
    const duration = 2800; // ms
    let startTime = null;

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    function step(ts) {
      if (!startTime) startTime = ts;
      const elapsed = ts - startTime;
      const progress = Math.min(elapsed / duration, 1);
      const eased = easeInOut(progress);
      const value = Math.round(eased * total);

      if (value !== current) {
        current = value;
        fill.style.width = current + '%';
        num.textContent = current;
      }

      if (progress < 1) {
        requestAnimationFrame(step);
      }
    }

    // start after the fade-in animations settle
    setTimeout(() => requestAnimationFrame(step), 600);
  </script>
</body>
</html>
