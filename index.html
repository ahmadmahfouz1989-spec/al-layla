<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الليلة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { background: #0a0a0f; }

    body {
      background: #0a0a0f;
      color: #fff;
      font-family: 'Tajawal', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    body.shake { animation: shake 0.5s ease; }

    .container {
      text-align: center;
      width: 90%;
      max-width: 600px;
      position: relative;
      z-index: 20;
    }

    .title {
      font-size: clamp(3rem, 10vw, 6.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #fff;
      margin-bottom: 1em;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .title.title-boom { animation: boom 0.6s ease; opacity: 1; }

    .progress-wrapper {
      opacity: 0;
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    .progress-track {
      background: #1a1a2e;
      border-radius: 100px;
      height: 10px;
      width: 100%;
      overflow: hidden;
      position: relative;
      box-shadow: 0 0 0 1px rgba(16, 185, 129, 0.15);
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      border-radius: 100px;
      background: linear-gradient(270deg, #065f46, #10b981, #6ee7b7);
      box-shadow: 0 0 8px rgba(16, 185, 129, 0.6), 0 0 20px rgba(16, 185, 129, 0.3);
      transition: width 0.03s linear, filter 0.1s ease-out;
      position: relative;
    }

    /* traveling shimmer sweep */
    .progress-fill::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(100deg, transparent 30%, rgba(255,255,255,0.4) 50%, transparent 70%);
      background-size: 200% 100%;
      animation: shimmer 2.2s linear infinite;
      border-radius: 100px;
    }

    /* shine on the left edge (leading edge in RTL) */
    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 40px; height: 100%;
      background: linear-gradient(270deg, transparent, rgba(255,255,255,0.4));
      border-radius: 100px;
    }

    @keyframes shimmer {
      from { background-position: 200% 0; }
      to   { background-position: -200% 0; }
    }

    @keyframes orb-breathe {
      0%, 100% { transform: scale(1); opacity: 1; }
      50%       { transform: scale(1.15); opacity: 0.7; }
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1.2rem;
    }

    /* num on the left in RTL = last in DOM order */
    .progress-pct {
      font-size: clamp(0.95rem, 2.5vw, 1.15rem);
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .progress-num {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #10b981, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      display: inline-block;
    }

    .progress-num.num-bump { animation: num-bump 0.18s ease; }

    /* ambient background layers */
    .orb-drift { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
    .orb-drift-1 { animation: drift1 46s ease-in-out infinite; }
    .orb-drift-2 { animation: drift2 38s ease-in-out infinite; }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: -1;
    }
    .orb-1 { width:400px; height:400px; background:rgba(16,185,129,0.08); top:-100px; left:-100px; }
    .orb-2 { width:300px; height:300px; background:rgba(167,139,250,0.08); bottom:-80px; right:-80px; }

    .smoke {
      position: fixed; border-radius: 50%;
      filter: blur(60px); pointer-events: none; z-index: -2; opacity: 0.06;
      background: radial-gradient(circle, rgba(140,140,160,0.6), transparent 70%);
    }
    .smoke-1 { width: 520px; height: 520px; top: 15%; left: 55%; animation: smoke-drift-1 55s ease-in-out infinite; }
    .smoke-2 { width: 420px; height: 420px; top: 60%; left: 5%;  animation: smoke-drift-2 65s ease-in-out infinite; }

    .rays {
      position: fixed; top: 50%; left: 50%; width: 160vmax; height: 160vmax;
      transform: translate(-50%, -50%);
      background: conic-gradient(from 0deg,
        transparent 0deg, rgba(255,220,120,0.16) 10deg, transparent 20deg,
        transparent 50deg, rgba(255,220,120,0.14) 60deg, transparent 70deg,
        transparent 100deg, rgba(255,220,120,0.16) 110deg, transparent 120deg,
        transparent 150deg, rgba(255,220,120,0.14) 160deg, transparent 170deg,
        transparent 200deg, rgba(255,220,120,0.16) 210deg, transparent 220deg,
        transparent 250deg, rgba(255,220,120,0.14) 260deg, transparent 270deg,
        transparent 300deg, rgba(255,220,120,0.16) 310deg, transparent 320deg,
        transparent 350deg, rgba(255,220,120,0.14) 360deg);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transition: opacity 1s ease;
    }
    .rays.active { opacity: 1; animation: rays-spin 10s linear infinite; }

    #flash {
      position: fixed; inset: 0; background: #fff; opacity: 0;
      pointer-events: none; z-index: 30;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes drift1 {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(70px, 45px); }
    }
    @keyframes drift2 {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(-55px, -60px); }
    }
    @keyframes smoke-drift-1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-90px, 50px) scale(1.2); }
    }
    @keyframes smoke-drift-2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(80px, -45px) scale(1.15); }
    }
    @keyframes rays-spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }
    @keyframes num-bump {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    @keyframes boom {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      10% { transform: translate(-8px, 4px); }
      20% { transform: translate(8px, -6px); }
      30% { transform: translate(-6px, 6px); }
      40% { transform: translate(6px, -4px); }
      50% { transform: translate(-4px, 4px); }
      60% { transform: translate(4px, -2px); }
      70% { transform: translate(-2px, 2px); }
      80% { transform: translate(2px, -1px); }
      90% { transform: translate(-1px, 1px); }
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:-3;"></canvas>
  <div class="smoke smoke-1"></div>
  <div class="smoke smoke-2"></div>
  <div class="orb-drift orb-drift-1"><div class="orb orb-1"></div></div>
  <div class="orb-drift orb-drift-2"><div class="orb orb-2"></div></div>
  <div class="rays" id="rays"></div>

  <div class="container">
    <h1 class="title">الليلة</h1>
    <div class="progress-wrapper">
      <div class="progress-track">
        <div class="progress-fill" id="fill"></div>
      </div>
      <div class="progress-label">
        <span class="progress-pct">مؤشر الليلة</span>
        <span class="progress-num" id="num">0</span>
      </div>
    </div>
  </div>

  <canvas id="fire-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10;will-change:transform;"></canvas>
  <div id="flash"></div>

  <script>
    const fill   = document.getElementById('fill');
    const num    = document.getElementById('num');
    const track  = document.querySelector('.progress-track');
    const orb1   = document.querySelector('.orb-1');
    const orb2   = document.querySelector('.orb-2');
    const title  = document.querySelector('.title');
    const rays   = document.getElementById('rays');
    const flash  = document.getElementById('flash');
    const canvas = document.getElementById('fire-canvas');
    const ctx    = canvas.getContext('2d');
    const bgCanvas = document.getElementById('bg-canvas');
    const bgCtx     = bgCanvas.getContext('2d');

    const isMobile = window.innerWidth < 768;

    function resizeCanvas() {
      canvas.width  = window.innerWidth;  canvas.height  = window.innerHeight;
      bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
      initStars();
    }
    window.addEventListener('resize', resizeCanvas);

    // ── Starfield background ────────────────────────────────────────────────

    let stars = [];
    function initStars() {
      const count = isMobile ? 50 : 110;
      stars = Array.from({ length: count }, () => ({
        x: Math.random() * bgCanvas.width,
        y: Math.random() * bgCanvas.height,
        r: Math.random() * 1.3 + 0.3,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.8 + 0.3,
      }));
    }
    resizeCanvas();

    function drawStars(t) {
      bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
      for (const s of stars) {
        const a = 0.25 + 0.6 * Math.abs(Math.sin(t * 0.0007 * s.speed + s.phase));
        bgCtx.globalAlpha = a;
        bgCtx.fillStyle   = '#fff';
        bgCtx.beginPath();
        bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        bgCtx.fill();
      }
      bgCtx.globalAlpha = 1;
    }

    // Pre-render fire sprite once — avoids createRadialGradient per particle per frame
    const SPRITE_SIZE = 64;
    const sprite = document.createElement('canvas');
    sprite.width = sprite.height = SPRITE_SIZE;
    const sCtx = sprite.getContext('2d');
    const sg = sCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    sg.addColorStop(0,   'rgba(255,255,180,1)');
    sg.addColorStop(0.35,'rgba(255,140,0,0.85)');
    sg.addColorStop(0.7, 'rgba(200,30,0,0.4)');
    sg.addColorStop(1,   'rgba(120,10,0,0)');
    sCtx.fillStyle = sg;
    sCtx.fillRect(0, 0, SPRITE_SIZE, SPRITE_SIZE);

    // ── Fire particles ────────────────────────────────────────────────────────

    const MAX_PARTICLES = isMobile ? 70 : 160;
    const MAX_SPARKS    = isMobile ? 20 : 50;
    const particles = [];
    const sparks    = [];
    const confetti  = [];

    class Particle {
      constructor(x, y, intensity) {
        this.x     = x;
        this.y     = y;
        this.vx    = (Math.random() - 0.5) * (1.5 + intensity * 2);
        this.vy    = -(Math.random() * (2 + intensity * 3) + 1);
        this.life  = 1;
        this.decay = Math.random() * 0.018 + 0.012 - intensity * 0.004;
        this.size  = Math.random() * (4 + intensity * 8) + 2;
      }
      update() {
        this.x    += this.vx + Math.sin(this.y * 0.05) * 0.4;
        this.y    += this.vy;
        this.vy   *= 0.975;
        this.life -= this.decay;
        this.size *= 0.975;
      }
      draw() {
        if (this.life <= 0) return;
        const d = this.size * 2;
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = this.life * 0.85;
        ctx.drawImage(sprite, this.x - d / 2, this.y - d / 2, d, d);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    // Slow glowing embers that drift and flicker — richer fire texture
    class Ember extends Particle {
      constructor(x, y, intensity) {
        super(x, y, intensity);
        this.vx      = (Math.random() - 0.5) * 0.6;
        this.vy      = -(Math.random() * 1.2 + 0.4);
        this.size    = Math.random() * 2 + 1;
        this.decay   = Math.random() * 0.006 + 0.004;
        this.flicker = Math.random() * Math.PI * 2;
      }
      update() {
        this.flicker += 0.2;
        this.x       += this.vx + Math.sin(this.y * 0.03 + this.flicker) * 0.6;
        this.y       += this.vy;
        this.life    -= this.decay;
      }
      draw() {
        if (this.life <= 0) return;
        const d     = this.size * 2;
        const flick = 0.5 + 0.5 * Math.sin(this.flicker * 3);
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = this.life * flick * 0.9;
        ctx.drawImage(sprite, this.x - d / 2, this.y - d / 2, d, d);
        ctx.globalAlpha = 1;
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    // Fast bright streaks shot from the flame tip at high intensity
    class Spark {
      constructor(x, y, intensity) {
        this.x = x; this.y = y;
        this.px = x; this.py = y;
        const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
        const speed = 4 + Math.random() * 6 * (0.5 + intensity);
        this.vx    = Math.cos(angle) * speed;
        this.vy    = Math.sin(angle) * speed;
        this.life  = 1;
        this.decay = Math.random() * 0.03 + 0.03;
      }
      update() {
        this.px = this.x; this.py = this.y;
        this.vy += 0.12;
        this.x  += this.vx; this.y += this.vy;
        this.life -= this.decay;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.globalCompositeOperation = 'lighter';
        ctx.strokeStyle = `rgba(255,225,150,${this.life})`;
        ctx.lineWidth   = 1.4;
        ctx.beginPath();
        ctx.moveTo(this.px, this.py);
        ctx.lineTo(this.x, this.y);
        ctx.stroke();
        ctx.globalCompositeOperation = 'source-over';
      }
    }

    // Colorful confetti for the climax finale
    class Confetti {
      constructor(x, y) {
        this.x = x; this.y = y;
        const angle = Math.random() * Math.PI * 2;
        const speed = 4 + Math.random() * 11;
        this.vx    = Math.cos(angle) * speed;
        this.vy    = Math.sin(angle) * speed - 5;
        this.life  = 1;
        this.decay = Math.random() * 0.007 + 0.006;
        this.size  = Math.random() * 5 + 3;
        this.rot   = Math.random() * Math.PI * 2;
        this.vr    = (Math.random() - 0.5) * 0.35;
        this.hue   = [45, 160, 280, 340, 20][Math.floor(Math.random() * 5)];
      }
      update() {
        this.vy   += 0.16;
        this.vx   *= 0.99;
        this.x    += this.vx; this.y += this.vy;
        this.rot  += this.vr;
        this.life -= this.decay;
      }
      draw() {
        if (this.life <= 0) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rot);
        ctx.globalAlpha  = this.life;
        ctx.fillStyle    = `hsl(${this.hue}, 90%, 65%)`;
        ctx.shadowColor  = `hsl(${this.hue}, 90%, 65%)`;
        ctx.shadowBlur   = 8;
        ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
        ctx.restore();
      }
    }

    let currentValue = 0;
    let emitting     = false;

    function spawnParticles(rect, pct, intensity) {
      // RTL: fill grows right→left; leading tip is at rect.right - fillWidth
      const tipX  = rect.right - rect.width * (pct / 100);
      const topY  = rect.top + rect.height / 2;
      const count = Math.floor(isMobile ? (1 + intensity * 4) : (3 + intensity * 10));
      for (let i = 0; i < count && particles.length < MAX_PARTICLES; i++) {
        const px = tipX + (Math.random() - 0.5) * 16;
        particles.push(Math.random() < 0.15 ? new Ember(px, topY, intensity) : new Particle(px, topY, intensity));
      }
      if (intensity > 0.4 && sparks.length < MAX_SPARKS && Math.random() < intensity * 0.5) {
        sparks.push(new Spark(tipX, topY, intensity));
      }
    }

    function explode(rect) {
      const cx    = rect.left + rect.width / 2;
      const cy    = rect.top;
      const count = isMobile ? 80 : 220;
      for (let i = 0; i < count; i++) {
        const p   = new Particle(cx + (Math.random() - 0.5) * rect.width, cy, 1);
        p.vy     *= 2.5; p.vx *= 2; p.size *= 1.8; p.decay *= 0.6;
        particles.push(p);
      }
    }

    function fireworksFinale(rect) {
      const cx    = rect.left + rect.width / 2;
      const cy    = rect.top;
      const count = isMobile ? 90 : 220;
      for (let i = 0; i < count; i++) {
        confetti.push(new Confetti(cx + (Math.random() - 0.5) * rect.width * 1.5, cy));
      }
    }

    function triggerFlash() {
      flash.style.transition = 'none';
      flash.style.opacity    = '0.85';
      requestAnimationFrame(() => {
        flash.style.transition = 'opacity 0.6s ease';
        flash.style.opacity    = '0';
      });
    }

    function fireLoop(ts) {
      drawStars(ts || 0);

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const trackRect = track.getBoundingClientRect();
      const intensity = Math.pow(currentValue / 99, 1.5);
      if (emitting && currentValue > 0) spawnParticles(trackRect, currentValue, intensity);

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update(); particles[i].draw();
        if (particles[i].life <= 0 || particles[i].size < 0.3) particles.splice(i, 1);
      }
      for (let i = sparks.length - 1; i >= 0; i--) {
        sparks[i].update(); sparks[i].draw();
        if (sparks[i].life <= 0) sparks.splice(i, 1);
      }
      for (let i = confetti.length - 1; i >= 0; i--) {
        confetti[i].update(); confetti[i].draw();
        if (confetti[i].life <= 0) confetti.splice(i, 1);
      }

      requestAnimationFrame(fireLoop);
    }
    requestAnimationFrame(fireLoop);

    // ── Progress curve ────────────────────────────────────────────────────────

    const curve = [
      [0, 0], [0.12, 20], [0.25, 40], [0.40, 60], [0.55, 75],
      [0.68, 85], [0.80, 91], [0.88, 95], [0.93, 97], [0.97, 98], [1.00, 99],
    ];

    const PHASE1_DURATION = 7000;
    const STALL_DURATION  = 2200;
    const PHASE2_DURATION = 400;

    function lerp(a, b, t) { return a + (b - a) * t; }

    function valueAtT(t) {
      for (let i = 1; i < curve.length; i++) {
        if (t <= curve[i][0]) {
          const [t0, v0] = curve[i - 1], [t1, v1] = curve[i];
          return lerp(v0, v1, (t - t0) / (t1 - t0));
        }
      }
      return 99;
    }

    let lastNum = -1;
    function applyValue(v) {
      currentValue = v;
      fill.style.width = v + '%';
      const rounded = Math.round(v);
      num.textContent = rounded;
      if (rounded !== lastNum) {
        lastNum = rounded;
        num.classList.remove('num-bump');
        void num.offsetWidth;
        num.classList.add('num-bump');
      }

      const intensity = Math.pow(v / 99, 1.5);
      const r = Math.round(lerp(16,  255, intensity));
      const g = Math.round(lerp(185, 120, intensity));
      const b = Math.round(lerp(129,  30, intensity));
      const color    = `rgb(${r},${g},${b})`;
      const colorDim = `rgba(${r},${g},${b},0.3)`;

      fill.style.background = `linear-gradient(270deg, rgba(6,95,70,1), ${color})`;
      fill.style.boxShadow  = `0 0 ${8 + intensity*24}px rgba(${r},${g},${b},${0.5 + intensity*0.4}), 0 0 ${20 + intensity*40}px ${colorDim}`;
      track.style.boxShadow = `0 0 0 1px ${colorDim}`;
      num.style.background  = `linear-gradient(135deg, ${color}, #fff)`;
      num.style.webkitBackgroundClip = 'text';
      num.style.backgroundClip       = 'text';
      num.style.textShadow  = `0 0 ${10 + intensity*30}px rgba(${r},${g},${b},${0.4 + intensity*0.4})`;

      const speed = lerp(3, 0.6, intensity);
      orb1.style.animation  = `orb-breathe ${speed}s ease-in-out infinite`;
      orb2.style.animation  = `orb-breathe ${speed * 0.85}s ease-in-out infinite`;
      orb1.style.background = `rgba(${r},${g},${b},${0.06 + intensity*0.12})`;
      orb2.style.background = `rgba(${r},${g},${b},${0.06 + intensity*0.1})`;

      updateAudio(intensity);
    }

    let phase1Start = null;
    function phase1(ts) {
      if (!phase1Start) phase1Start = ts;
      const t = Math.min((ts - phase1Start) / PHASE1_DURATION, 1);
      applyValue(valueAtT(t));
      if (t < 1) { requestAnimationFrame(phase1); }
      else        { playRiser(STALL_DURATION / 1000); setTimeout(phase2, STALL_DURATION); }
    }

    let phase2Start = null;
    function phase2(ts) {
      if (ts === undefined) { requestAnimationFrame(phase2); return; }
      if (!phase2Start) { phase2Start = ts; explode(track.getBoundingClientRect()); }
      const t = Math.min((ts - phase2Start) / PHASE2_DURATION, 1);
      applyValue(99 + t);
      if (t < 1) {
        requestAnimationFrame(phase2);
      } else {
        fill.style.transition  = 'box-shadow 0.4s ease';
        fill.style.boxShadow   = '0 0 60px rgba(255,255,255,0.8), 0 0 120px rgba(255,200,100,0.5)';
        title.style.transition = 'text-shadow 0.4s ease';
        title.style.textShadow = '0 0 40px rgba(255,220,120,0.7)';
        title.classList.add('title-boom');
        playClimaxSound();
        fireworksFinale(track.getBoundingClientRect());
        triggerFlash();
        rays.classList.add('active');
        document.body.classList.add('shake');
        setTimeout(() => document.body.classList.remove('shake'), 500);
      }
    }

    // ── Audio engine ──────────────────────────────────────────────────────────
    // Cinematic A-minor build: bass rumble + string pad + staccato pulses

    const AC = window.AudioContext || window.webkitAudioContext;
    let ac, master, bassGain, padGain, padFilter, noiseBuffer;
    let pulseTimeout = null;
    let audioReady   = false;
    let audioIntensity = 0;

    function buildReverb(dest) {
      // Parallel comb filters simulating a small room
      const out = ac.createGain();
      out.gain.value = 0.28;
      out.connect(dest);
      [0.019, 0.041, 0.067, 0.097, 0.131].forEach((t, i) => {
        const d = ac.createDelay(0.5);
        const g = ac.createGain();
        d.delayTime.value = t;
        g.gain.value = 0.6 * Math.exp(-i * 0.45);
        d.connect(g); g.connect(out);
      });
      const input = ac.createGain();
      input.gain.value = 1;
      [0.019, 0.041, 0.067, 0.097, 0.131].forEach(t => {
        const d = ac.createDelay(0.5);
        d.delayTime.value = t;
        input.connect(d);
      });
      return input; // connect sources here to add reverb
    }

    function startOsc(freq, type, gainVal, dest) {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      g.gain.value = gainVal;
      osc.connect(g); g.connect(dest);
      osc.start();
      return osc;
    }

    function addVibrato(osc, rate, depth) {
      const lfo = ac.createOscillator();
      const lg  = ac.createGain();
      lfo.type = 'sine';
      lfo.frequency.value = rate;
      lg.gain.value = depth;
      lfo.connect(lg); lg.connect(osc.frequency);
      lfo.start();
    }

    function createNoiseBuffer() {
      const size   = ac.sampleRate * 2;
      const buffer = ac.createBuffer(1, size, ac.sampleRate);
      const data   = buffer.getChannelData(0);
      for (let i = 0; i < size; i++) data[i] = Math.random() * 2 - 1;
      return buffer;
    }

    function initAudio() {
      ac     = new AC();
      master = ac.createGain();
      master.gain.value = 0.75;

      const comp = ac.createDynamicsCompressor();
      comp.threshold.value = -16; comp.ratio.value = 4; comp.knee.value = 8;
      master.connect(comp); comp.connect(ac.destination);

      const reverb = buildReverb(master);

      noiseBuffer = createNoiseBuffer();

      // Bass: low sine cluster on A (55 Hz) — deep rumble
      bassGain = ac.createGain();
      bassGain.gain.value = 0;
      bassGain.connect(master);
      [[55, 0.45], [55.25, 0.3], [82.4, 0.2], [27.5, 0.35]].forEach(([f, v]) => {
        startOsc(f, 'sine', v, bassGain);
      });

      // String pad: A-minor chord (A2 C3 E3 G3) with detuned pairs + vibrato
      padGain   = ac.createGain();
      padFilter = ac.createBiquadFilter();
      padFilter.type = 'lowpass';
      padFilter.frequency.value = 700;
      padFilter.Q.value = 1.8;
      padGain.connect(padFilter);
      padFilter.connect(master);
      padGain.connect(reverb); // wet send

      [[110, 110.4], [130.8, 131.2], [164.8, 165.2], [196, 196.5], [220, 220.6]]
        .forEach(([f1, f2]) => {
          const o1 = startOsc(f1, 'sawtooth', 0.055, padGain);
          const o2 = startOsc(f2, 'sawtooth', 0.055, padGain);
          addVibrato(o1, 4.2 + Math.random() * 0.6, 1.2);
          addVibrato(o2, 4.5 + Math.random() * 0.6, 1.4);
        });

      // Also a hollow 5th layer (triangle — softer texture)
      const o5 = startOsc(440, 'triangle', 0.03, padGain);
      addVibrato(o5, 3.8, 0.8);

      schedulePulse();
      audioReady = true;
    }

    function stab(freq, vol, dur) {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      const f   = ac.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = freq * 1.8; f.Q.value = 2.5;
      osc.type = 'sawtooth'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0, ac.currentTime);
      g.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
      osc.connect(f); f.connect(g); g.connect(master);
      osc.start(); osc.stop(ac.currentTime + dur + 0.01);
    }

    function pulseFill() {
      fill.style.filter = 'brightness(1.35)';
      setTimeout(() => { fill.style.filter = ''; }, 90);
    }

    function schedulePulse() {
      const i   = audioIntensity;
      const bpm = 44 + i * 136;          // 44 bpm → 180 bpm
      const ms  = (60 / bpm) * 1000;

      if (i > 0.05) {
        stab(220, 0.07 + i * 0.13, 0.07 + (1 - i) * 0.08);
        pulseFill();
        if (i > 0.5 && Math.random() < i * 0.6)
          setTimeout(() => stab(165, 0.05 + i * 0.08, 0.06), ms * 0.5);
      }
      pulseTimeout = setTimeout(schedulePulse, ms);
    }

    function updateAudio(intensity) {
      if (!audioReady) return;
      audioIntensity = intensity;
      const now = ac.currentTime;
      bassGain.gain.setTargetAtTime(intensity * 0.72, now, 0.9);
      padGain.gain.setTargetAtTime(intensity * 0.55, now, 1.1);
      padFilter.frequency.setTargetAtTime(700 + intensity * 1600, now, 1.4);
    }

    // Whoosh/riser: noise sweep + rising sawtooth, building anticipation into the climax
    function playRiser(duration) {
      if (!audioReady) return;
      const now = ac.currentTime;

      const noise = ac.createBufferSource();
      noise.buffer = noiseBuffer;
      noise.loop   = true;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass'; bp.Q.value = 0.9;
      bp.frequency.setValueAtTime(180, now);
      bp.frequency.exponentialRampToValueAtTime(6500, now + duration);
      const ng = ac.createGain();
      ng.gain.setValueAtTime(0.0001, now);
      ng.gain.exponentialRampToValueAtTime(0.5, now + duration * 0.92);
      ng.gain.linearRampToValueAtTime(0.0001, now + duration + 0.05);
      noise.connect(bp); bp.connect(ng); ng.connect(master);

      const osc = ac.createOscillator();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(110, now);
      osc.frequency.exponentialRampToValueAtTime(1400, now + duration);
      const og = ac.createGain();
      og.gain.setValueAtTime(0.0001, now);
      og.gain.exponentialRampToValueAtTime(0.32, now + duration * 0.95);
      og.gain.linearRampToValueAtTime(0.0001, now + duration + 0.05);
      osc.connect(og); og.connect(master);

      noise.start(now); osc.start(now);
      noise.stop(now + duration + 0.1); osc.stop(now + duration + 0.1);
    }

    function playClimaxSound() {
      if (!audioReady) return;
      clearTimeout(pulseTimeout);
      // Full A-minor chord: big impact then long decay
      [[55,'sine',0.22],[110,'sine',0.18],[130.8,'triangle',0.15],
       [164.8,'triangle',0.13],[220,'triangle',0.11],[261.6,'sine',0.09],
       [329.6,'sine',0.07],[440,'sine',0.05]].forEach(([f, type, v], i) => {
        const osc = ac.createOscillator();
        const g   = ac.createGain();
        osc.type = type; osc.frequency.value = f;
        g.gain.setValueAtTime(v, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 5);
        osc.connect(g); g.connect(master);
        osc.start(); osc.stop(ac.currentTime + 5.1);
      });
      master.gain.setTargetAtTime(0, ac.currentTime + 2.5, 1.5);
    }

    // ── Start ─────────────────────────────────────────────────────────────────
    // The reveal begins on its own as soon as the page loads. Browsers still
    // block audio until a real user gesture, so we try to init/resume it right
    // away, and again silently on the first tap/click/key if it got blocked —
    // the visuals never wait on that.

    let started = false;
    function beginReveal() {
      if (started) return;
      started = true;
      try {
        initAudio();
        if (ac.state === 'suspended') ac.resume();
      } catch (e) {}
      emitting = true;
      requestAnimationFrame(phase1);
    }
    beginReveal();

    function resumeAudioIfNeeded() {
      try {
        if (ac && ac.state === 'suspended') ac.resume();
      } catch (e) {}
    }
    ['click', 'touchstart', 'keydown'].forEach(ev =>
      document.addEventListener(ev, resumeAudioIfNeeded)
    );
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
